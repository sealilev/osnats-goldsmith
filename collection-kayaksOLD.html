<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קיאקים וים | אסנת לוי</title>
  <meta name="description" content="קולקציית קיאקים וים - תכשיטים בעיצוב אישי, אסנת לוי" />
  <link rel="stylesheet" href="style-v2.css" />
  <style>

    /* ---- Sticky category nav ---- */
  .cat-nav-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    width: 100%;
    text-align: center;
    padding: 1rem 2rem;
  }

  .cat-nav {
    display: inline-flex;
    flex-direction: row;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  
.cat-nav a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 0.88rem;
  letter-spacing: 0.06em;
  padding: 0.4rem 1rem;
  border-radius: 20px;
  border: 1px solid var(--border-glow);
  background: rgba(8, 110, 140, 0.55);
  backdrop-filter: blur(8px);
  transition: all 0.3s;
  white-space: nowrap;
  }

    .cat-nav a:hover,
    .cat-nav a.active {
      color: var(--silver-shine);
      border-color: var(--border-glow);
      background: rgba(46, 196, 218, 0.12);
    }

    /* ---- Collection page content ---- */
    .collection-page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    /* ---- Category section ---- */
    .cat-section {
      margin-bottom: 4rem;
      scroll-margin-top: 60px;
    }

    .cat-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      color: var(--teal-light);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .cat-section h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--teal-mid), transparent);
    }

    /* ---- Photo grid ---- */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
    }

    .photo-item {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      background: linear-gradient(135deg, var(--teal-deep), var(--bg-dark));
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .photo-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(46, 196, 218, 0.3);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .photo-item:hover img {
      transform: scale(1.08);
    }

    /* ---- Lightbox ---- */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      line-height: 1;
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-prev { right: 1.5rem; }
    .lightbox-next { left: 1.5rem; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255,255,255,0.2);
    }

    @media (max-width: 640px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-nav { gap: 0.3rem; padding: 0.6rem 1rem; }
      .cat-nav a { font-size: 0.78rem; padding: 0.3rem 0.7rem; }
    }
  </style>
</head>
<body>

  <div class="particles" aria-hidden="true">

    <div class="particle" style="left:75%; width:4px; height:4px; --dur:16s; --delay:6s;"></div>
  </div>

  <header>
    <div class="logo-wrap">
      <img src="images/logo.png" alt="לוגו אסנת לוי" class="logo-img" />
      <span class="site-title">אסנת לוי</span>
    </div>
    <nav aria-label="ניווט ראשי">
      <ul>
        <li><a href="index.html">ראשי</a></li>
        <li><a href="jewelry.html">צורפות</a></li>
        <li><a href="workshop-jewelry.html">סדנה</a></li>
      </ul>
    </nav>
    <a href="collection-kayaks-en.html" class="lang-toggle" aria-label="Switch to English">
      🇬🇧 <span>EN</span>
    </a>
  </header>

  <!-- תפריט קטגוריות עוגנים -->
  <div class="cat-nav-wrap">
    <nav class="cat-nav" aria-label="קטגוריות">
      <a href="#necklaces">שרשראות</a>
      <a href="#bracelets">צמידים</a>
      <a href="#rings">טבעות</a>
      <a href="#custom">הזמנות אישיות</a>

  <main>

      <p>קולקציה בהשראת הים הפתוח</p>
    </section>

    <div class="divider"></div>

    <div class="collection-page">

      <!-- שרשראות -->
      <section class="cat-section" id="necklaces">
        <h2>שרשראות</h2>
        <div class="photo-grid" data-category="necklaces">
          <div class="photo-item" data-src="images/jewelry/kayaks/necklaces/1.jpg"><img src="images/jewelry/kayaks/necklaces/1.jpg" alt="שרשרת 1" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/necklaces/2.jpg"><img src="images/jewelry/kayaks/necklaces/2.jpg" alt="שרשרת 2" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/necklaces/3.jpg"><img src="images/jewelry/kayaks/necklaces/3.jpg" alt="שרשרת 3" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/necklaces/4.jpg"><img src="images/jewelry/kayaks/necklaces/4.jpg" alt="שרשרת 4" onerror="this.parentElement.style.opacity='0.3'" /></div>
        </div>
      </section>

      <!-- צמידים -->
      <section class="cat-section" id="bracelets">
        <h2>צמידים</h2>
        <div class="photo-grid" data-category="bracelets">
          <div class="photo-item" data-src="images/jewelry/kayaks/bracelets/1.jpg"><img src="images/jewelry/kayaks/bracelets/1.jpg" alt="צמיד 1" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/bracelets/2.jpg"><img src="images/jewelry/kayaks/bracelets/2.jpg" alt="צמיד 2" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/bracelets/3.jpg"><img src="images/jewelry/kayaks/bracelets/3.jpg" alt="צמיד 3" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/bracelets/4.jpg"><img src="images/jewelry/kayaks/bracelets/4.jpg" alt="צמיד 4" onerror="this.parentElement.style.opacity='0.3'" /></div>

      <!-- טבעות -->
      <section class="cat-section" id="rings">
        <h2>טבעות</h2>

          <div class="photo-item" data-src="images/jewelry/kayaks/rings/2.jpg"><img src="images/jewelry/kayaks/rings/2.jpg" alt="טבעת 2" onerror="this.parentElement.style.opacity='0.3'" /></div>

          <div class="photo-item" data-src="images/jewelry/kayaks/rings/4.jpg"><img src="images/jewelry/kayaks/rings/4.jpg" alt="טבעת 4" onerror="this.parentElement.style.opacity='0.3'" /></div>

      <!-- הזמנות אישיות -->
      <section class="cat-section" id="custom">
        <h2>הזמנות אישיות</h2>
        <div class="photo-grid" data-category="custom">
          <div class="photo-item" data-src="images/jewelry/kayaks/custom/1.jpg"><img src="images/jewelry/kayaks/custom/1.jpg" alt="הזמנה אישית 1" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/custom/2.jpg"><img src="images/jewelry/kayaks/custom/2.jpg" alt="הזמנה אישית 2" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/custom/3.jpg"><img src="images/jewelry/kayaks/custom/3.jpg" alt="הזמנה אישית 3" onerror="this.parentElement.style.opacity='0.3'" /></div>
          <div class="photo-item" data-src="images/jewelry/kayaks/custom/4.jpg"><img src="images/jewelry/kayaks/custom/4.jpg" alt="הזמנה אישית 4" onerror="this.parentElement.style.opacity='0.3'" /></div>

    </div>

    <a href="jewelry.html" class="back-link">
      &#x2190; חזרה לצורפות
    </a>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="תצוגת תמונה">
    <button class="lightbox-close" id="lb-close" aria-label="סגור">✕</button>
    <button class="lightbox-prev" id="lb-prev" aria-label="הקודם">&#x2039;</button>
    <img id="lb-img" src="" alt="תמונה מוגדלת" />
    <button class="lightbox-next" id="lb-next" aria-label="הבא">&#x203a;</button>
  </div>

  <footer>
    <p class="credit">האתר עוצב ונבנה ע"י ליאורה לוי &mdash; <span dir="ltr">Sea++</span></p>
    <p class="rights">זכויות האתר © <span id="year"></span> ליאורה Levi &nbsp;|&nbsp; זכויות התכשיטים והתכנים © אסנת Levy</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let allItems = [];
    let currentIndex = 0;

    function openLightbox(items, index) {
      allItems = items;
      currentIndex = index;
      lbImg.src = allItems[currentIndex].dataset.src;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + allItems.length) % allItems.length;
      lbImg.src = allItems[currentIndex].dataset.src;
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % allItems.length;
      lbImg.src = allItems[currentIndex].dataset.src;
    }

    document.querySelectorAll('.photo-item').forEach(item => {
      item.addEventListener('click', () => {
        const grid = item.closest('.photo-grid');
        const items = Array.from(grid.querySelectorAll('.photo-item'));
        const index = items.indexOf(item);
        openLightbox(items, index);
      });
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', showPrev);
    document.getElementById('lb-next').addEventListener('click', showNext);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft') showPrev();
    });

    // Active anchor highlight in cat-nav
    const sections = document.querySelectorAll('.cat-section');
    const navLinks = document.querySelectorAll('.cat-nav a');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.remove('active'));
          const active = document.querySelector(`.cat-nav a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, { threshold: 0.3 });

    sections.forEach(s => observer.observe(s));
  </script>
</body>
</html>
