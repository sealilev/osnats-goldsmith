<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עולים ליבשה | אסנת לוי</title>
  <meta name="description" content="קולקציית קיאקים וים - תכשיטים בעיצוב אישי, אסנת לוי" />
  <link rel="stylesheet" href="css/style-v2.css" />
  <style>

    /* ---- Sticky category nav ---- */
  .cat-nav-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    width: 100%;
    text-align: center;
    padding: 1rem 2rem;
  }

  .cat-nav {
    display: inline-flex;
    flex-direction: row;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  
.cat-nav a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 0.88rem;
  letter-spacing: 0.06em;
  padding: 0.4rem 1rem;
  border-radius: 20px;
  border: 1px solid var(--border-glow);
  background: rgba(8, 110, 140, 0.55);
  backdrop-filter: blur(8px);
  transition: all 0.3s;
  white-space: nowrap;
  }

    .cat-nav a:hover,
    .cat-nav a.active {
      color: var(--silver-shine);
      border-color: var(--border-glow);
      background: rgba(46, 196, 218, 0.12);
    }

    /* ---- Collection page content ---- */
    .collection-page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    /* ---- Category section ---- */
    .cat-section {
      margin-bottom: 4rem;
      scroll-margin-top: 60px;
    }

    .cat-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      color: var(--teal-light);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .cat-section h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--teal-mid), transparent);
    }

    /* ---- Photo scroll row ---- */
    .photo-grid {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 0.8rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .photo-grid::-webkit-scrollbar {
      height: 4px;
    }

    .photo-grid::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
    }

    .photo-grid::-webkit-scrollbar-thumb {
      background: var(--teal-mid);
      border-radius: 2px;
    }

    /* Card = image + info */
    .photo-card {
      flex: 0 0 200px;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      scroll-snap-align: start;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .photo-item {
      width: 100%;
      height: 200px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .photo-item:hover img {
      transform: scale(1.06);
    }

    /* Info below image */
    .item-info {
      padding: 0.7rem 0.8rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--silver-shine);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 1.2em;
    }

    .item-size-price {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
      min-height: 1.1em;
      font-size: 0.82rem;
    }

    .item-size {
      color: var(--text-muted);
      font-style: italic;
    }

    .item-price {
      color: var(--teal-bright);
      font-weight: 500;
    }

    .item-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      margin-top: 0.35rem;
      transition: transform 0.2s, box-shadow 0.2s;
      align-self: flex-start;
    }

    .item-whatsapp:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    }

    @media (max-width: 640px) {
      .photo-card { flex: 0 0 155px; }
      .photo-item { height: 155px; }
      .cat-nav { gap: 0.3rem; padding: 0.6rem 1rem; }
      .cat-nav a { font-size: 0.78rem; padding: 0.3rem 0.7rem; }
      .lightbox { flex-direction: column; padding: 1rem; }
      .lightbox img { max-width: 90vw; max-height: 50vh; }
      .lb-info { align-items: center; }
    }

    .photo-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(46, 196, 218, 0.3);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .photo-item:hover img {
      transform: scale(1.08);
    }

    /* ---- Lightbox ---- */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      padding: 2rem;
      gap: 2rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 55vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    .lb-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      min-width: 200px;
    }

    .lb-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--silver-shine);
    }

    .lb-price {
      font-size: 1.2rem;
      color: var(--teal-bright);
      font-weight: 500;
    }

    .lb-size {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .lb-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .lb-whatsapp:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      line-height: 1;
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-prev { right: 1.5rem; }
    .lightbox-next { left: 1.5rem; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255,255,255,0.2);
    }

    @media (max-width: 640px) {
      .photo-item { flex: 0 0 150px; height: 150px; }
      .cat-nav { gap: 0.3rem; padding: 0.6rem 1rem; }
      .cat-nav a { font-size: 0.78rem; padding: 0.3rem 0.7rem; }
      .lightbox { flex-direction: column; padding: 1rem; }
      .lightbox img { max-width: 90vw; max-height: 50vh; }
      .lb-info { align-items: center; }
    }
  </style>
</head>
<body>

  <div class="particles" aria-hidden="true">
    <div class="particle" style="left:12%; width:3px; height:3px; --dur:14s; --delay:0s;"></div>
    <div class="particle" style="left:45%; width:2px; height:2px; --dur:11s; --delay:3s;"></div>
    <div class="particle" style="left:75%; width:4px; height:4px; --dur:16s; --delay:6s;"></div>
  </div>

  <header>
    <div class="logo-wrap">
      <img src="images/logo.png" alt="לוגו אסנת לוי" class="logo-img" />
      <span class="site-title">אסנת לוי</span>
    </div>
    <nav aria-label="ניווט ראשי">
      <ul>
        <li><a href="index.html">ראשי</a></li>
        <li><a href="jewelry.html">צורפות</a></li>
        <li><a href="workshop-jewelry.html">סדנה</a></li>
      </ul>
    </nav>
    <a href="collection-land-en.html" class="lang-toggle" aria-label="Switch to English">
      🇬🇧 <span>EN</span>
    </a>
  </header>

  <main>
    <section class="page-hero">
      <h1>עולים ליבשה</h1>
      <p>קולקציה בהשראת הטבע והיבשה</p>
    </section>

    <div class="divider"></div>

    <div class="collection-page">

      <!-- שרשראות -->
      <section class="cat-section" id="necklaces">
        <h2>שרשראות</h2>
        <div class="photo-grid" id="grid-necklaces"></div>
      </section>

      <!-- צמידים -->
      <section class="cat-section" id="bracelets">
        <h2>צמידים</h2>
        <div class="photo-grid" id="grid-bracelets"></div>
      </section>

      <!-- טבעות -->
      <section class="cat-section" id="rings">
        <h2>טבעות</h2>
        <div class="photo-grid" id="grid-rings"></div>
      </section>

      <!-- הזמנות אישיות -->
      <section class="cat-section" id="custom">
        <h2>הזמנות אישיות</h2>
        <div class="photo-grid" id="grid-custom"></div>
      </section>

    </div>

    <a href="jewelry.html" class="back-link">
      &#x2190; חזרה לצורפות
    </a>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="תצוגת תמונה">
    <button class="lightbox-close" id="lb-close" aria-label="סגור">✕</button>
    <button class="lightbox-prev" id="lb-prev" aria-label="הקודם">&#x2039;</button>
    <img id="lb-img" src="" alt="תמונה מוגדלת" />
    <div class="lb-info">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-price" id="lb-price"></div>
      <div class="lb-size" id="lb-size"></div>
      <a class="lb-whatsapp" id="lb-whatsapp" href="#" target="_blank" rel="noopener noreferrer">
        💬 שליחת ווצאפ
      </a>
    </div>
    <button class="lightbox-next" id="lb-next" aria-label="הבא">&#x203a;</button>
  </div>

  <footer>
    <p class="credit">האתר עוצב ונבנה ע"י ליאורה לוי &mdash; <span dir="ltr">Sea++</span></p>
    <p class="rights">זכויות האתר © <span id="year"></span> ליאורה Levi &nbsp;|&nbsp; זכויות התכשיטים והתכנים © אסנת Levy</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const COLLECTION = 'land';
    const CATEGORIES = {
      necklaces: 'שרשראות',
      bracelets: 'צמידים',
      rings: 'טבעות',
      custom: 'הזמנות אישיות'
    };

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbName = document.getElementById('lb-name');
    const lbPrice = document.getElementById('lb-price');
    const lbWhatsapp = document.getElementById('lb-whatsapp');
    let allItems = [];
    let currentIndex = 0;

    function updateLightbox() {
      const item = allItems[currentIndex];
      lbImg.src = item.dataset.src;
      lbName.textContent = item.dataset.name || '';
      lbPrice.textContent = item.dataset.price ? item.dataset.price + ' ש"ח' : '';
      const lbSize = document.getElementById('lb-size');
      if (lbSize) lbSize.textContent = item.dataset.size || '';
      const msg = encodeURIComponent('היי אסנת, אני מעוניינ.ת ב' + (item.dataset.name || 'תכשיט') + (item.dataset.price ? ' (מחיר: ' + item.dataset.price + ' ש"ח)' : ''));
      lbWhatsapp.href = 'https://wa.me/972523744408?text=' + msg;
    }

    function openLightbox(items, index) {
      allItems = items;
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + allItems.length) % allItems.length;
      updateLightbox();
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % allItems.length;
      updateLightbox();
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', showPrev);
    document.getElementById('lb-next').addEventListener('click', showNext);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft') showPrev();
    });

    // Build gallery from catalog.json
    function buildGrid(catKey, items) {
      const grid = document.getElementById('grid-' + catKey);
      if (!grid) return;
      grid.innerHTML = '';
      if (!items || items.length === 0) {
        grid.closest('.cat-section').style.display = 'none';
        return;
      }
      items.forEach((item, i) => {
        // Card wrapper
        const card = document.createElement('div');
        card.className = 'photo-card';

        // Image area
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.dataset.src = item.path;
        div.dataset.name = item.name || '';
        div.dataset.price = item.price || '';
        div.dataset.size = item.size || '';
        const img = document.createElement('img');
        img.src = item.path;
        img.alt = item.name || '';
        img.onerror = () => card.style.opacity = '0.3';
        div.appendChild(img);
        div.addEventListener('click', () => {
          const allDivs = Array.from(grid.querySelectorAll('.photo-item'));
          openLightbox(allDivs, allDivs.indexOf(div));
        });

        // Info area
        const info = document.createElement('div');
        info.className = 'item-info';

        if (item.name) {
          const name = document.createElement('div');
          name.className = 'item-name';
          name.textContent = item.name;
          info.appendChild(name);
        }

        // Size + price on same row
        const sizePriceRow = document.createElement('div');
        sizePriceRow.className = 'item-size-price';
        if (item.size) {
          const size = document.createElement('span');
          size.className = 'item-size';
          size.textContent = item.size;
          sizePriceRow.appendChild(size);
        }
        if (item.price) {
          const price = document.createElement('span');
          price.className = 'item-price';
          price.textContent = item.price + ' ש"ח';
          sizePriceRow.appendChild(price);
        }
        info.appendChild(sizePriceRow);

        // WhatsApp button
        const wa = document.createElement('a');
        wa.className = 'item-whatsapp';
        wa.target = '_blank';
        wa.rel = 'noopener noreferrer';
        const msg = 'היי אסנת, אני מעוניינ.ת ב' +
          (item.name || 'תכשיט') +
          (item.price ? ' (מחיר: ' + item.price + ' ש"ח)' : '') +
          (item.size ? ' (גודל: ' + item.size + ')' : '');
        wa.href = 'https://wa.me/972523744408?text=' + encodeURIComponent(msg);
        wa.innerHTML = '💬 שליחת ווצאפ';
        info.appendChild(wa);

        card.appendChild(div);
        card.appendChild(info);
        grid.appendChild(card);
      });
    }

    fetch('catalog.json')
      .then(r => r.json())
      .then(catalog => {
        const col = catalog[COLLECTION] || {};
        Object.keys(CATEGORIES).forEach(cat => buildGrid(cat, col[cat]));

        // Active anchor highlight
        const sections = document.querySelectorAll('.cat-section');
        const navLinks = document.querySelectorAll('.cat-nav a');
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              navLinks.forEach(a => a.classList.remove('active'));
              const active = document.querySelector(`.cat-nav a[href="#${entry.target.id}"]`);
              if (active) active.classList.add('active');
            }
          });
        }, { threshold: 0.3 });
        sections.forEach(s => observer.observe(s));
      })
      .catch(() => console.warn('catalog.json not found'));
  </script>
</body>
</html>
