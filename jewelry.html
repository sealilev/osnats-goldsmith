<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>צורפות | אסנת לוי</title>
  <meta name="description" content="תכשיטים בעיצוב אישי ועל פי הזמנה - אסנת לוי צורפת" />
  <link rel="stylesheet" href="css/style-v2.css" />
  <style>
    .collections-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 2rem;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .collection-tile {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      border-radius: 16px;
      border: 1px solid var(--border-glow);
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .collection-tile:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(46, 196, 218, 0.28), 0 0 0 1px rgba(46, 196, 218, 0.5);
      border-color: rgba(46, 196, 218, 0.65);
    }

    .tile-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: linear-gradient(135deg, var(--teal-deep), var(--bg-dark));
    }

    .tile-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .collection-tile:hover .tile-img-wrap img {
      transform: scale(1.06);
    }

    .tile-content {
      padding: 1.2rem;
      text-align: center;
    }

    .tile-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--silver-shine);
      letter-spacing: 0.03em;
    }

    @media (max-width: 640px) {
      .collection-grid {
        grid-template-columns: 1fr;
        max-width: 360px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <div class="particles" aria-hidden="true">
    <div class="particle" style="left:12%; width:3px; height:3px; --dur:14s; --delay:0s;"></div>
    <div class="particle" style="left:30%; width:2px; height:2px; --dur:11s; --delay:3s;"></div>
    <div class="particle" style="left:60%; width:4px; height:4px; --dur:16s; --delay:6s;"></div>
    <div class="particle" style="left:80%; width:2px; height:2px; --dur:13s; --delay:1s;"></div>
  </div>

  <header>
    <div class="logo-wrap">
      <img src="images/logo.png" alt="לוגו אסנת לוי" class="logo-img" />
      <span class="site-title">אסנת לוי</span>
    </div>
    <nav aria-label="ניווט ראשי">
      <ul>
        <li><a href="index.html">ראשי</a></li>
        <li><a href="jewelry.html">צורפות</a></li>
        <li><a href="workshop-jewelry.html">סדנה</a></li>
      </ul>
    </nav>
    <a href="jewelry-en.html" class="lang-toggle" aria-label="Switch to English">
      🇬🇧 <span>EN</span>
    </a>
  </header>

  <main>
    <section class="page-hero">
      <h1>צורפות</h1>
      <p>תכשיטים בעיצוב אישי &nbsp;✦&nbsp; הזמנות מיוחדות</p>
    </section>

    <div class="divider"></div>

    <div class="collections-wrap">
      <div class="collection-grid">

        <a href="collection-kayaks.html" class="collection-tile" aria-label="קולקציית קיאקים וים">
          <div class="tile-img-wrap">
            <img src="images/jewelry/kayaks/kayaks.png" alt="קיאקים וים" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">קיאקים וים</span>
          </div>
        </a>

        <a href="collection-land.html" class="collection-tile" aria-label="קולקציית עולים ליבשה">
          <div class="tile-img-wrap">
            <img src="images/jewelry/land/land.png" alt="עולים ליבשה" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">עולים ליבשה</span>
          </div>
        </a>

        <a href="collection-moto.html" class="collection-tile" aria-label="קולקציית עולים לשטח">
          <div class="tile-img-wrap">
            <img src="images/jewelry/moto/moto.png" alt="עולם לשטח" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">עולים לשטח – אופנועים</span>
          </div>
        </a>

      </div>
    </div>

    <a href="index.html" class="back-link">
      &#x2190; חזרה לדף הראשי
    </a>
  </main>

  <footer>
    <p class="credit">האתר עוצב ונבנה ע"י ליאורה לוי &mdash; <span dir="ltr">Sea++</span></p>
    <p class="rights">זכויות האתר © <span id="year"></span> ליאורה Levi &nbsp;|&nbsp; זכויות התכשיטים והתכנים © אסנת Levy</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
