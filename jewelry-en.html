<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewelry | Osnat Levy</title>
  <meta name="description" content="Custom jewelry design and special orders - Osnat Levy Goldsmith" />
  <link rel="stylesheet" href="css/style-v2.css" />
  <style>
    .collections-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 2rem;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .collection-tile {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      border-radius: 16px;
      border: 1px solid var(--border-glow);
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .collection-tile:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(46, 196, 218, 0.28), 0 0 0 1px rgba(46, 196, 218, 0.5);
      border-color: rgba(46, 196, 218, 0.65);
    }

    .tile-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: linear-gradient(135deg, var(--teal-deep), var(--bg-dark));
    }

    .tile-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .collection-tile:hover .tile-img-wrap img {
      transform: scale(1.06);
    }

    .tile-content {
      padding: 1.2rem;
      text-align: center;
    }

    .tile-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--silver-shine);
      letter-spacing: 0.03em;
    }

    @media (max-width: 640px) {
      .collection-grid {
        grid-template-columns: 1fr;
        max-width: 360px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <div class="particles" aria-hidden="true">
    <div class="particle" style="left:12%; width:3px; height:3px; --dur:14s; --delay:0s;"></div>
    <div class="particle" style="left:30%; width:2px; height:2px; --dur:11s; --delay:3s;"></div>
    <div class="particle" style="left:60%; width:4px; height:4px; --dur:16s; --delay:6s;"></div>
    <div class="particle" style="left:80%; width:2px; height:2px; --dur:13s; --delay:1s;"></div>
  </div>

  <header>
    <div class="logo-wrap">
      <img src="images/logo.png" alt="לוגו אסנת לוי" class="logo-img" />
      <span class="site-title">אסנת לוי</span>
    </div>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index-en.html">Home</a></li>
        <li><a href="jewelry-en.html">Jewelry</a></li>
        <li><a href="workshop-jewelry-en.html">Workshop</a></li>
      </ul>
    </nav>
    <a href="jewelry.html" class="lang-toggle" aria-label="עבור לעברית">
      🇮🇱 <span>עב</span>
    </a>
  </header>

  <main>
    <section class="page-hero">
      <h1>Jewelry</h1>
      <p>Custom jewelry design &nbsp;✦&nbsp; Special orders</p>
    </section>

    <div class="divider"></div>

    <div class="collections-wrap">
      <div class="collection-grid">

        <a href="collection-kayaks-en.html" class="collection-tile" aria-label="Kayaks & Sea collection">
          <div class="tile-img-wrap">
            <img src="images/jewelry/kayaks/kayaks.png" alt="Kayaks & Sea" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">Kayaks & Sea</span>
          </div>
        </a>

        <a href="collection-land-en.html" class="collection-tile" aria-label="On Land collection">
          <div class="tile-img-wrap">
            <img src="images/jewelry/land/land.png" alt="On Land" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">On Land</span>
          </div>
        </a>

        <a href="collection-moto-en.html" class="collection-tile" aria-label="Off-Road collection">
          <div class="tile-img-wrap">
            <img src="images/jewelry/moto/moto.png" alt="Off-Road" onerror="this.style.opacity='0'" />
          </div>
          <div class="tile-content">
            <span class="tile-title">Off-Road – Motorcycles</span>
          </div>
        </a>

      </div>
    </div>

    <a href="index-en.html" class="back-link">
      &#x2190; חזרה לדף הראשי#x2192; Back to Home
    </a>
  </main>

  <footer>
    <p class="credit">Website designed &amp; built by Liora Levi &mdash; <span dir="ltr">Sea++</span></p>
    <p class="rights">Website © <span id="year"></span> Liora Levi &nbsp;|&nbsp; Jewelry &amp; content © Osnat Levy</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
